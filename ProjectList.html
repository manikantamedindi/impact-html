<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Impact : Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Bootstrap 5.3.3 CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Bootstrap Icons 1.11.3 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Google Font: Nunito Sans -->
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/modules/navigation.css" />
  </head>

  <body class="bg-default">
    <div id="pageLoader" class="page-loader">
      <div class="page-loader-content">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <span class="page-loader-text">Loading project data...</span>
      </div>
    </div>

    <div class="app-container">
      <div id="header-placeholder"></div>

      <div class="page-content">
        <!--  -->
        <div>
          <div id="sidebar-placeholder"></div>
          <div id="nav-placeholder"></div>
        </div>

        <main class="main bg-default">
          <div class="body-container">
            <div class="breadcrumb-wrapper">
              <h2 class="breadcrumb-title">
                <span class="breadcrumb-title-icon" aria-hidden="true"></span>
                Project List
              </h2>
              <div class="breadcrumb-group">
                <a href="index.html" class="breadcrumb-item">Dashboard</a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-current">Project List</span>
              </div>
            </div>

            <div class="filters-navbar">
              <div class="row p-0 m-0">
                <div class="col-md-3 ps-0">
                  <div class="filters-wrapper">
                    <div class="search-filter">
                      <svg
                        class="search-filter-icon"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                      </svg>
                      <input
                        type="text"
                        placeholder="Search Projects..."
                        class="search-filter-input"
                      />
                    </div>
                  </div>
                </div>
                <div class="col-md-9 pe-0">
                  <div
                    class="filters-wrapper d-flex justify-content-end align-items-center gap-3"
                  >
                    <div class="dropdown-filter">
                      <select
                        id="select-filter"
                        class="form-control"
                        aria-label="Filter by assigned to"
                      >
                        <option value="all" selected>All Projects</option>
                        <option value="open">Open Projects</option>
                        <option value="closed">Closed Projects</option>
                      </select>
                    </div>
                    <div class="filter-action-buttons">
                      <button
                        class="btn btn-success fiter-button"
                        type="button"
                        id="addProjectBtn"
                      >
                        <img
                          src="img/icons/plus.svg"
                          class="filter-button-icon"
                          alt="plus icon"
                        />
                        Add Project
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- AG Grid Table Container -->
            <div
              id="projectsGrid"
              class="ag-theme-quartz ag-grid-responsive-height"
            ></div>
            <div class="mt-2 small text-body-secondary page-footer-attribution">
              © 2026 - SEBA.Net
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-enterprise@32.3.0/dist/ag-grid-enterprise.min.js?t=1733931380679"></script>
    <!-- External AG Grid Scripts -->
    <script src="js/ag-grid/agGridSetup.js"></script>
    <script src="js/ag-grid/projectsList.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="js/modules/navigation.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
