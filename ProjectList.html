<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Impact : Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Bootstrap 5.3.3 CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <!-- Bootstrap Icons 1.11.3 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Google Font: Nunito Sans -->
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/modules/navigation.css" />
  </head>

  <body class="home-page project-list-page bg-default">
    <div id="pageLoader" class="page-loader">
      <div class="page-loader-content">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <span class="page-loader-text">Loading project data...</span>
      </div>
    </div>

    <div class="app-container">
      <div id="header-placeholder"></div>

      <div class="page-content">
        <div id="sidebar-placeholder"></div>
        <div id="nav-placeholder"></div>
        <main class="main bg-default sister-technology-page">
          <div class="body-container">
            <div class="breadcrumb-wrapper">
              <h2 class="breadcrumb-title">
                <span
                  class="glyphicon glyphicon-th-list breadcrumb-title-icon"
                  aria-hidden="true"
                ></span>
                Project List
              </h2>
              <div class="breadcrumb-group">
                <a href="index.html" class="breadcrumb-item">Dashboard</a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-current">Project List</span>
              </div>
            </div>

            <div class="filters-navbar issues-list-filters-navbar">
              <div class="row p-0 m-0">
                <div class="col-md-3 ps-0">
                  <div class="filters-wrapper">
                    <div class="search-filter">
                      <svg
                        class="search-filter-icon"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                      </svg>
                      <input
                        type="text"
                        placeholder="Search Projects..."
                        class="search-filter-input"
                      />
                    </div>
                  </div>
                </div>
                <div class="col-md-9 pe-0">
                  <div
                    class="filters-wrapper d-flex justify-content-end align-items-center gap-3"
                  >
                    <div class="dropdown-filter">
                      <select
                        id="select-filter"
                        class="form-control"
                        aria-label="Filter by assigned to"
                      >
                        <option value="all" selected>All Projects</option>
                        <option value="open">Open Projects</option>
                        <option value="closed">Closed Projects</option>
                      </select>
                    </div>
                    <div class="filter-action-buttons">
                      <button
                        class="btn btn-success fiter-button"
                        type="button"
                        id="addProjectBtn"
                      >
                        <img
                          src="/assets/icons/plus.svg"
                          class="filter-button-icon"
                          alt="plus icon"
                        />
                        Add Project
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- AG Grid Table Container -->
            <div
              id="projectsGrid"
              class="ag-theme-quartz ag-grid-responsive-height"
            ></div>
            <div
              id="projectsMobileCards"
              class="projects-mobile-cards"
              aria-live="polite"
            ></div>
            <template id="projectsMobileCardTemplate">
              <article class="projects-mobile-card">
                <div class="projects-mobile-card-head">
                  <a
                    class="projects-mobile-project-link"
                    data-role="project-link"
                    href="#"
                  ></a>
                  <span class="projects-mobile-state" data-role="state"></span>
                </div>
                <div class="projects-mobile-meta-grid">
                  <div class="projects-mobile-meta-item">
                    <span class="projects-mobile-meta-label"
                      >Project Number</span
                    >
                    <span
                      class="projects-mobile-meta-value"
                      data-role="project-number"
                    ></span>
                  </div>
                  <div class="projects-mobile-meta-item">
                    <span class="projects-mobile-meta-label">Manager</span>
                    <span
                      class="projects-mobile-meta-value"
                      data-role="manager"
                    ></span>
                  </div>
                  <div class="projects-mobile-meta-item">
                    <span class="projects-mobile-meta-label">Start Date</span>
                    <span
                      class="projects-mobile-meta-value"
                      data-role="start-date"
                    ></span>
                  </div>
                  <div class="projects-mobile-meta-item">
                    <span class="projects-mobile-meta-label">End Date</span>
                    <span
                      class="projects-mobile-meta-value"
                      data-role="end-date"
                    ></span>
                  </div>
                  <div
                    class="projects-mobile-meta-item projects-mobile-meta-item-wide"
                  >
                    <span class="projects-mobile-meta-label">Description</span>
                    <span
                      class="projects-mobile-meta-value"
                      data-role="description"
                    ></span>
                  </div>
                </div>
                <div class="projects-mobile-card-foot">
                  <a
                    class="projects-mobile-action-link"
                    data-role="edit-link"
                    href="#"
                    >Edit</a
                  >
                </div>
              </article>
            </template>

            <div class="mt-2 small text-body-secondary page-footer-attribution">
              © 2026 - SEBA.Net
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-enterprise@32.3.0/dist/ag-grid-enterprise.min.js?t=1733931380679"></script>
    <!-- External AG Grid Scripts -->
    <script src="ag-grid/agGridSetup.js"></script>
    <script src="ag-grid/projectsList.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="js/modules/navigation.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
