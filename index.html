<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Impact : Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Bootstrap 5.3.3 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

    <!-- Bootstrap Icons 1.11.3 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Google Font: Nunito Sans -->
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modules/navigation.css">
</head>

<body class="bg-default">

    <div class="app-container">
        <div id="header-placeholder"></div>

        <div class="page-content">
            <div id="sidebar-placeholder"></div>
            <div id="nav-placeholder"></div>
            <main class="flex-grow-1 content-wrapper">
                <div class="home-layout d-flex justify-content-center align-items-center" style="min-height: 80vh;">
                    <div class="home-form-col" style="flex: 0 1 100%; max-width: 500px; padding: 2rem; background: var(--c-white);">
                        <div class="home-form-inner">
                            <div class="home-form-header">
                                <div class="home-heading-text">
                                    <h1 class="home-heading-title">Installation Monitoring, Progress and
                                        Commissioning Tracker</h1>
                                </div>
                                <div class="home-brand-line">
                                    <img src="img/Logo.svg" alt="Logo" class="home-form-logo">
                                </div>
                            </div>

                                <div class="home-field-group">
                                    <label class="home-field-label" for="activeProject">Select Project</label>
                                    <div class="home-select-wrap">
                                        <select class="home-select" id="activeProject">
                                            <option value="">Choose a project workspace...</option>
                                            <option value="1" selected>A3-00001234 - IMPACT DEMO</option>
                                            <option value="2">A3-00005678 - PROJECT TEST</option>
                                        </select>
                                        <svg class="home-select-chevron" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                            stroke-linejoin="round">
                                            <path d="m6 9 6 6 6-6" />
                                        </svg>
                                    </div>

                                    <label class="home-checkbox-row">
                                        <input type="checkbox" id="showClosedProjects" class="home-checkbox">
                                        <span class="home-checkbox-label">Show Closed Projects</span>
                                    </label>
                                </div>

                                <div class="home-timezone-text">Time Zone: Asia/Calcutta ID: India Standard Time</div>
                                <div class="home-footer-text">&copy; 2026 - SEBA.Net</div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="js/modules/navigation.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
